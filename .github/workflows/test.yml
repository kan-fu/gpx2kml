name: check
on:
  push:
    branches:
      main
  pull_request:
    branches:
      main
  workflow_dispatch:

jobs:
  quality:
    name: quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src test
      - name: Format check
        run: uv run ruff format --check src test
      - name: Type check
        run: uv run mypy src test

  test:
    name: test with ${{ matrix.py }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        py:
          - "3.13"
          - "3.10"
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python for test ${{ matrix.py }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run test suite
        run: uv run pytest